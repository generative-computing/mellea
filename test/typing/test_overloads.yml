- case: sync_always_computed
  main: |
    from typing import cast
    from mellea.core import Backend, Context
    from mellea.stdlib.functional import act, instruct
    from mellea.stdlib.components import Instruction
    from mellea.stdlib.session import MelleaSession

    ctx = cast(Context, None)
    backend = cast(Backend, None)
    action: Instruction = cast(Instruction, None)
    s = cast(MelleaSession, None)

    r1 = act(action, ctx, backend)
    reveal_type(r1)  # N: Revealed type is "tuple[mellea.core.base.ComputedModelOutputThunk[builtins.str], mellea.core.base.Context]"

    r2 = instruct("test", ctx, backend)
    reveal_type(r2)  # N: Revealed type is "tuple[mellea.core.base.ComputedModelOutputThunk[builtins.str], mellea.core.base.Context]"

    r3 = s.act(action)
    reveal_type(r3)  # N: Revealed type is "mellea.core.base.ComputedModelOutputThunk[builtins.str]"

    r4 = s.instruct("test")
    reveal_type(r4)  # N: Revealed type is "mellea.core.base.ComputedModelOutputThunk[builtins.str]"
