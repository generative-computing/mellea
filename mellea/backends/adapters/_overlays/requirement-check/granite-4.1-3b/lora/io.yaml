name: requirement-check
# Model name string, or null to use whatever is provided in the chat completion request
model: ~
# JSON schema of the model's output
response_format: |
  {
    "type": "object",
    "properties": {
      "score": {
        "type": "string",
        "enum": ["yes", "no"]
      }
    },
    "required": ["score"],
    "additionalProperties": false
  }
# Output transformation rules to apply
transformations:
  - type: likelihood
    categories_to_values:
      "yes": 1.0
      "no": 0.0
    input_path: ["score"]
  # Convert scalar value to a record for consistency with other intrinsics
  - type: nest
    input_path: []
    field_name: "requirement_check"
instruction: |-
  <requirements>: {requirement}
  Please verify if the assistant's generation satisfies the user's requirements or not and reply with a binary label accordingly. Respond with a json {{"score": "yes"}} if the constraints are satisfied or respond with {{"score": "no"}} if the constraints are not satisfied.
parameters:
  max_completion_tokens: 15
  temperature: 0.0
sentence_boundaries: ~
